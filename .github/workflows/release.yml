name: Release Build

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
    branches:
      - master

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
jobs:
  build:
    # Only run if the Tests workflow was successful
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      attestations: write
    steps:
    - uses: actions/checkout@v4

    - name: Generate Version Number
      id: version
      run: |
        VERSION="v0.1.${{ github.run_number }}"
        echo "release_version=$VERSION" >> $GITHUB_OUTPUT

    - name: Cache APT packages
      uses: actions/cache@v4
      with:
        path: ~/apt-cache
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/release.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    - name: Install dependencies
      run: |
        mkdir -p ~/apt-cache
        sudo cp -rn ~/apt-cache/. /var/cache/apt/archives/ || true
        sudo apt-get update
        sudo apt-get install -y ffmpeg libasound2-dev libwayland-dev libxkbcommon-dev libegl1-mesa-dev libfontconfig1-dev
        sudo cp -rn /var/cache/apt/archives/. ~/apt-cache/ || true

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        shared-key: "spiralvision-cache"

    - name: Build release
      run: cargo build --release

    - name: Cache AppImageTool
      id: cache-appimagetool
      uses: actions/cache@v4
      with:
        path: ./appimagetool-x86_64.AppImage
        key: ${{ runner.os }}-appimagetool-v1

    - name: Download AppImageTool
      if: steps.cache-appimagetool.outputs.cache-hit != 'true'
      run: |
        wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage

    - name: Prepare AppDir
      run: |
        mkdir -p AppDir/usr/bin
        cp target/release/spiralvision AppDir/usr/bin/
        cp .github/assets/logo.png AppDir/spiralvision.png
        
        echo "[Desktop Entry]" > AppDir/spiralvision.desktop
        echo "Name=SpiralVision" >> AppDir/spiralvision.desktop
        echo "Exec=spiralvision" >> AppDir/spiralvision.desktop
        echo "Icon=spiralvision" >> AppDir/spiralvision.desktop
        echo "Type=Application" >> AppDir/spiralvision.desktop
        echo "Categories=AudioVideo;" >> AppDir/spiralvision.desktop
        
        # Create AppRun
        echo '#!/bin/sh' > AppDir/AppRun
        echo 'HERE="$(dirname "$(readlink -f "${0}")")"' >> AppDir/AppRun
        echo 'export PATH="${HERE}/usr/bin:${PATH}"' >> AppDir/AppRun
        echo 'exec spiralvision "$@"' >> AppDir/AppRun
        chmod +x AppDir/AppRun

    - name: Build AppImage
      run: ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir SpiralVision-x86_64.AppImage

    - name: Rename Binary
      run: mv target/release/spiralvision target/release/spiralvision-linux-x86_64

    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: spiralvision-linux-x86_64
        path: target/release/spiralvision-linux-x86_64

    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: SpiralVision-x86_64.AppImage
        path: SpiralVision-x86_64.AppImage

    - name: Generate Release Notes
      run: |
        echo "## SpiralVision-10 Continuous Build (${{ steps.version.outputs.release_version }})" > release_notes.md
        echo "This is an automated build from the latest master commit." >> release_notes.md
        echo "" >> release_notes.md
        echo "### Artifacts" >> release_notes.md
        echo "- \`SpiralVision-x86_64.AppImage\`: Portable Linux AppImage. Just download, \`chmod +x\`, and run! Contains built-in logo and desktop integration." >> release_notes.md
        echo "- \`spiralvision-linux-x86_64\`: Raw 64-bit Linux executable." >> release_notes.md
        echo "" >> release_notes.md
        echo "### Requirements" >> release_notes.md
        echo "To run this application, ensure you have the required system dependencies installed:" >> release_notes.md
        echo "\`\`\`bash" >> release_notes.md
        echo "sudo apt update && sudo apt install -y ffmpeg libasound2-dev libwayland-dev libxkbcommon-dev libegl1-mesa-dev libfontconfig1-dev" >> release_notes.md
        echo "\`\`\`" >> release_notes.md

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.release_version }}
        name: Build ${{ steps.version.outputs.release_version }} (Linux x86_64)
        body_path: release_notes.md
        draft: false
        prerelease: false
        make_latest: true
        files: |
          target/release/spiralvision-linux-x86_64
          SpiralVision-x86_64.AppImage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
